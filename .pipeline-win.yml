# https://re-git.lanl.gov/aea/developer-operations/aea-job-environment
include:
  - project: aea/developer-operations/aea-job-environment
    ref: main
    file: .pipeline-common.yml

stages:
  - test

default:
  tags:
    - windows
    - pn2606796

win-developer-test:
  extends:
    - .win-temp-environment
  stage: test
  script: scons regression --abaqus-command='C:\SIMULIA\Commands\abq2024.bat' --cubit-command='C:\Program Files\Cubit 16.18\bin\cubit.exe'
  coverage: '/(?i)total.*? (100(?:\.0+)?\%|[1-9]?\d(?:\.\d+)?\%)$/'
  rules:
    - if: $PARENT_CI_PIPELINE_SOURCE == "schedule"
    - if: $PARENT_CI_PIPELINE_SOURCE == "merge_request_event"

win-conda-build:
  extends:
    - .win-temp-environment
  stage: test
  rules:
    - if: $PARENT_CI_PIPELINE_SOURCE == "schedule"
    - if: $PARENT_CI_PIPELINE_SOURCE == "merge_request_event"
  variables:
    environment_file: "conda-build.yml"
    recipe_directory: "recipe"
  script:
    # Job variables
    - Write-Output $recipe_directory
    - if ([string]::IsNullOrEmpty($recipe_directory)) { exit 1 }
    # Job commands
    - $env:VERSION=python -m setuptools_scm
    - rattler-build build --recipe $recipe_directory --channel conda-forge --output-dir $env:temp

win-pip-build:
  extends:
    - .win-temp-environment
  stage: test
  rules:
    - if: $PARENT_CI_PIPELINE_SOURCE == "schedule"
    - if: $PARENT_CI_PIPELINE_SOURCE == "merge_request_event"
  variables:
    distribution_name: "turbo_turtle"
    environment_file: "pip-build.yml"
  script:
    # Job variables
    - scons pyproject.toml
    - $version=python -m setuptools_scm
    - Write-Output $version
    - if ([string]::IsNullOrEmpty($distribution_name)) { exit 1 }
    - if ([string]::IsNullOrEmpty($version)) { exit 1 }
    # Job commands
    # Conda CI environment active
    - scons build
    - python -m venv pip-build-test
    # Python venv environment active
    - pip-build-test\Scripts\Activate.ps1
    - python -m pip install --verbose --disable-pip-version-check --require-virtualenv --no-cache-dir build\dist\$distribution_name-$version.tar.gz pytest pytest-xdist gmsh
    - cd pip-build-test\Lib\site-packages\turbo_turtle
    - python -m pytest -vvv -n 4
